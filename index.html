<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chintu Pathak Photography | Premium Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --white: #ffffff;
            --off-white: #f7f5f2;
            --cream: #f0ece6;
            --black: #111111;
            --dark: #222222;
            --muted: #888888;
            --light-border: #e8e4df;
            --accent: #b8a082;
            --accent-dark: #9a8468;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background-color: var(--white);
            color: var(--black);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 400; color: var(--black); }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; display: block; }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
        .section-padding { padding: 110px 0; }

        @media (max-width: 768px) { 
            .container { padding: 0 24px; } 
            .section-padding { padding: 80px 0; } 
        }

        /* ---- ANIMATIONS ---- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideRight {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }
        @keyframes floatWA {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .fade-up { opacity: 0; transform: translateY(36px); transition: opacity 0.8s var(--ease), transform 0.8s var(--ease); }
        .fade-up.active { opacity: 1; transform: translateY(0); }
        .fade-in-el { opacity: 0; transition: opacity 0.9s ease; }
        .fade-in-el.active { opacity: 1; }

        /* ---- HEADER ---- */
        header {
            position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--light-border);
            transition: box-shadow 0.4s ease;
        }
        header.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.06); }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 40px; max-width: 1280px; margin: 0 auto;
        }
        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem; font-weight: 600;
            color: var(--black); letter-spacing: 0.5px;
        }
        .logo span { color: var(--accent); font-style: italic; font-weight: 300; }
        
        .nav-links { display: flex; gap: 44px; }
        .nav-links a {
            font-weight: 400; font-size: 0.82rem;
            text-transform: uppercase; letter-spacing: 1.8px;
            color: var(--muted); transition: color 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--accent);
            transition: width 0.3s ease;
        }
        .nav-links a:hover { color: var(--black); }
        .nav-links a:hover::after { width: 100%; }

        /* Mobile Menu */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 7px; z-index: 1001; padding: 4px; }
        .hamburger span { width: 28px; height: 1.5px; background-color: var(--black); transition: 0.4s ease; display: block; }

        @media (max-width: 900px) {
            nav { padding: 20px 24px; }
            .nav-links {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 100%;
                background: var(--white); flex-direction: column;
                justify-content: center; align-items: center;
                transition: right 0.55s cubic-bezier(0.77, 0, 0.18, 1);
                gap: 36px; z-index: 1000;
            }
            .nav-links.active { right: 0; }
            .nav-links a {
                font-size: 1rem; font-family: var(--font-heading);
                font-weight: 400; color: var(--black); letter-spacing: 2px;
            }
            .hamburger { display: flex; }
            .hamburger.toggle .line1 { transform: rotate(-45deg) translate(-5px, 5.5px); }
            .hamburger.toggle .line2 { opacity: 0; width: 0; }
            .hamburger.toggle .line3 { transform: rotate(45deg) translate(-5px, -5.5px); }
        }

        /* ---- BUTTONS ---- */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 38px; font-weight: 400; letter-spacing: 1.5px;
            transition: all 0.4s var(--ease); cursor: pointer; border: none;
            font-family: var(--font-body); text-transform: uppercase;
            font-size: 0.78rem; border-radius: 0; position: relative; overflow: hidden;
        }
        .btn::before {
            content: ''; position: absolute; inset: 0;
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.4s var(--ease);
        }
        .btn:hover::before { transform: scaleX(1); }
        .btn span { position: relative; z-index: 1; }

        .btn-primary {
            background: var(--black); color: var(--white);
        }
        .btn-primary::before { background: var(--accent-dark); }
        .btn-primary:hover { color: var(--white); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

        .btn-outline {
            border: 1.5px solid var(--black); color: var(--black); background: transparent;
        }
        .btn-outline::before { background: var(--black); }
        .btn-outline:hover { color: var(--white); transform: translateY(-2px); }

        .btn-accent {
            background: var(--accent); color: var(--white);
        }
        .btn-accent::before { background: var(--accent-dark); }
        .btn-accent:hover { color: var(--white); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,160,130,0.35); }

        @media (max-width: 480px) {
            .btn { padding: 15px 28px; font-size: 0.76rem; }
        }

        /* ---- HERO ---- */
        .hero {
            min-height: 100vh; display: flex; align-items: flex-end;
            padding-bottom: 80px;
            background: linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.45)),
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
            padding-top: 80px;
        }
        .hero-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 40px;
            width: 100%;
        }
        .hero-label {
            font-size: 0.78rem; text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease) 0.2s forwards;
        }
        .hero-label::before { content: ''; width: 40px; height: 1px; background: var(--accent); display: inline-block; }
        .hero h1 {
            font-size: clamp(3.4rem, 8vw, 7rem);
            line-height: 1.04; font-weight: 300; color: var(--black);
            max-width: 800px; margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.9s var(--ease) 0.45s forwards;
        }
        .hero h1 em { font-style: italic; color: var(--accent); }
        .hero-desc {
            font-size: 1rem; color: var(--dark); max-width: 480px;
            font-weight: 300; line-height: 1.75; margin-bottom: 44px;
            opacity: 0;
            animation: fadeUp 0.9s var(--ease) 0.65s forwards;
        }
        .hero-btns {
            display: flex; gap: 16px; flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 0.9s var(--ease) 0.85s forwards;
        }

        @media (max-width: 768px) {
            .hero { padding-bottom: 60px; align-items: flex-end; }
            .hero-inner { padding: 0 24px; }
            .hero h1 { font-size: clamp(2.8rem, 11vw, 4rem); }
            .hero-btns { flex-direction: column; }
            .hero-btns .btn { width: 100%; text-align: center; justify-content: center; }
        }

        /* ---- DIVIDER LINE ---- */
        .divider {
            width: 60px; height: 1px; background: var(--accent); margin: 0 auto 20px;
        }
        .section-header { text-align: center; margin-bottom: 64px; }
